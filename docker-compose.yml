services:
  fraud-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fraud-detection-api:latest
    container_name: fraud-detection-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mlflow-ui:
    image: python:3.12-slim
    container_name: fraud-mlflow-ui
    working_dir: /mlflow
    volumes:
      - ./mlruns.db:/mlflow/mlruns.db
    command: >
      sh -c "pip install --no-cache-dir mlflow==3.14.0 &&
             mlflow server --backend-store-uri sqlite:///mlruns.db --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    restart: unless-stopped
